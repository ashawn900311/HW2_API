name: Daily API Fetcher

on:
  schedule:
    - cron: '0 0 * * *' 
  [cite_start]workflow_dispatch: 

jobs:
  run-api-script:
    [cite_start]runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        [cite_start]uses: actions/checkout@v4

      - name: Set up Python
        [cite_start]uses: actions/setup-python@v4 
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests 

      - name: Run Python script
        run: python api_fetch.py 

      - name: Upload output JSON
        [cite_start]uses: actions/upload-artifact@v4 
        with:
          name: api-result
          path: cat_fact.json
